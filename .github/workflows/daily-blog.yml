name: Daily SEO Blog

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Generate even if a post already exists for today'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  schedule:
    # 05:00 UTC = 07:00 CEST (summer) / 06:00 CET (winter).
    # GitHub Actions can delay scheduled jobs, so we run once and rely on
    # the script's own idempotency to prevent duplicate posts.
    - cron: '0 5 * * *'

permissions:
  contents: write

concurrency:
  group: daily-seo-blog
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate daily blog post
        env:
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'anthropic' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-5' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.2' }}
          REDDIT_SUBREDDITS: ${{ vars.REDDIT_SUBREDDITS || 'SEO,bigseo,TechSEO,smallbusiness' }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            npm run blog:daily -- --force
          else
            npm run blog:daily
          fi

      - name: Build site
        run: npm run build

      - name: Commit generated post
        run: |
          git add src/content/blog

          if git diff --cached --quiet -- src/content/blog; then
            echo "No new blog post to commit."
            exit 0
          fi

          git config user.name "seo-wiesbaden-blog-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Add daily SEO blog post"
          git push
